spring:
  cache:
    redis:
      time-to-live: 5m
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    mcp:
      client:
        enabled: true
        name: springai-demo
        type: SYNC
        request-timeout: 30s
        toolcallback:
          enabled: true
        stdio:
          connections:
            filesystem:
              command: cmd
              args:
                - "/c"
                - "npx"
                - "-y"
                - "@modelcontextprotocol/server-filesystem"
                - "${app.workspace.base-dir}"
    model:
      embedding: ollama
    ollama:
      embedding:
        options:
          model: bge-m3
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
    openfeign:
      circuitbreaker:
        enabled: false
logging:
  level:
    org.springframework.ai.model.tool: DEBUG
eureka:
  client:
    enabled: false
app:
  push:
    serverchan:
      key: ${SERVERCHAN_KEY:}
  workspace:
    mode: local
    base-dir: "D:\\ai-workspace"
  trading-data:
    base-url: "http://localhost:8000"
  auth:
    mode: jwt
  jwt:
    secret: spring-ai-demo-jwt-secret-key-please-change-in-production
    ttl-millis: 3600000