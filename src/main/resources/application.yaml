
spring:
  profiles:
    active: ai-local
  application:
    name: SpringAIDemo
  # ① MySQL 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/springai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456      # ← ⚠️ 改成你自己的真实密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    # ② Ollama 模型
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:32b

    # ③ 自动建对话记忆表
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always




logging:
  level:
    org.springframework.ai.model.tool: DEBUG
    org.springframework.ai.tool: DEBUG
server:
  port: 8989
#测试用
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents
#结束
  endpoint:
    health:
      show-details: always





demo:
  greeting: ai-local
