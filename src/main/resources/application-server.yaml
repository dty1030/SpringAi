spring:
  ai:
    model:
      embedding: ollama
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
    openfeign:
      circuitbreaker:
        enabled: false

eureka:
  client:
    enabled: false

app:
  workspace:
    mode: server
  auth:
    mode: jwt
  jwt:
    secret: spring-ai-demo-jwt-secret-key-please-change-in-production
    ttl-millis: 3600000
