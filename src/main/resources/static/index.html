<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-app {
            width: 100%;
            max-width: 760px;
            height: 90vh;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
            background: #fff;
            gap: 14px;
        }
        .chat-header h1 { font-size: 18px; color: #333; white-space: nowrap; }
        .auth-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        #username {
            width: 120px;
            padding: 7px 10px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        #username:focus { border-color: #0084ff; }
        #login, #logout, #new-chat {
            padding: 7px 12px;
            font-size: 13px;
            color: #555;
            background: #f0f2f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #login:hover, #logout:hover, #new-chat:hover { background: #e4e6eb; }
        #auth-status {
            min-width: 116px;
            font-size: 13px;
            color: #666;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #0084ff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: #f0f2f5;
            color: #222;
            border-bottom-left-radius: 4px;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid #eee;
        }
        #tool-mode {
            width: 92px;
            padding: 0 10px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        #tool-mode:focus { border-color: #0084ff; }
        #input {
            flex: 1;
            resize: none;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            max-height: 120px;
        }
        #input:focus { border-color: #0084ff; }
        #send {
            padding: 0 22px;
            font-size: 15px;
            color: #fff;
            background: #0084ff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #send:hover { background: #0073e0; }
        #send:disabled { background: #a0c8f0; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-app">
        <header class="chat-header">
            <h1>Spring AI Chat</h1>
            <div class="auth-bar">
                <input id="username" type="text" value="admin" aria-label="Username">
                <button id="login">Login</button>
                <button id="logout">Logout</button>
                <span id="auth-status">Not logged in</span>
                <button id="new-chat">New Chat</button>
            </div>
        </header>

        <main id="messages" class="messages"></main>

        <footer class="input-bar">
            <select id="tool-mode" aria-label="Tool mode">
                <option value="none">None</option>
                <option value="time">Time</option>
                <option value="file">File</option>
                <option value="rag">RAG</option>
                <option value="code">Code</option>
                <option value="all">All</option>
            </select>
            <textarea id="input" rows="1"
                      placeholder="Type a message. Enter to send, Shift+Enter for newline."></textarea>
            <button id="send">Send</button>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
